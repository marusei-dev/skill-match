{% extends 'base.html' %}

{% load socialaccount %} {% block content %}
<style>
    .content-box {
        background-color: white;
        max-width: 400px; 
        margin: 60px auto;
        padding: 30px 40px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        text-align: center;
    }

    input[type="text"], input[type="password"] {
        width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 20px;
        border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }

    .submit-btn {
        background-color: #0056b3; color: white; border: none; padding: 12px 20px;
        font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;
        margin-bottom: 15px; transition: background 0.3s;
    }
    .submit-btn:hover { background-color: #004494; }

    .google-btn {
        background-color: #db4437; color: white; border: none; padding: 12px 20px;
        font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;
        display: block; text-decoration: none; margin-bottom: 20px; transition: background 0.3s;
        box-sizing: border-box;
    }
    .google-btn:hover { background-color: #c23321; }

    .divider {
        margin: 20px 0; color: #888; font-size: 14px; position: relative;
    }
    .divider::before, .divider::after {
        content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background-color: #ddd;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .register-link { color: #0056b3; text-decoration: none; font-weight: bold; }
    .register-link:hover { text-decoration: underline; }

    .error-msg {
        color: #d9534f; font-size: 14px; margin-bottom: 15px; background-color: #f9f2f2;
        padding: 10px; border-radius: 4px;
    }
</style>

<div class="content-box">
    <h2 style="color: #0056b3; margin-top: 0;">Welcome Back</h2>
    <p style="color: #666; margin-bottom: 25px;">Please login to your account</p>

    {% if form.errors %}
        <div class="error-msg">Invalid username or password. Please try again.</div>
    {% endif %}

    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        
        <div style="text-align: left;">
            <label for="username"><b>Username</b></label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            
            <label for="password"><b>Password</b></label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        
        <input type="hidden" name="next" value="{{ next|default:'/profile/' }}">

        <button type="submit" class="submit-btn">Login</button>
    </form>

    <div class="divider">OR</div>

    <form action="{% provider_login_url 'google' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="google-btn-custom">
            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </button>
    </form>

    <p style="margin-top: 20px; font-size: 15px;">
        Don't have an account? <a href="{% url 'register' %}" class="register-link">Register here</a>
    </p>
</div>
{% endblock %}
